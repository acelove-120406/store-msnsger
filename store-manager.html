<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="店舗管理">
<title>店舗税務管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1a1916;--text2:#6b6a64;--text3:#9b9a94;
  --green:#1a7a50;--green-bg:#e8f5ee;
  --red:#b03020;--red-bg:#fdf0ee;
  --amber:#8a6200;--amber-bg:#fdf6e3;
  --blue:#1a4f8a;--blue-bg:#eaf1fb;
  --purple:#4a3a9a;--purple-bg:#f0eeff;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;color:var(--text);font-size:15px}
input,select,textarea,button{font-family:inherit;font-size:15px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#app{min-height:100vh;padding-bottom:48px}

/* Topbar */
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:17px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* Card */
.card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;border:.5px solid var(--border)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;border:.5px solid var(--border2);background:var(--surface);color:var(--text)}
.btn:active{opacity:.7}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-send{background:#0a5c45;color:#e1f5ee;border-color:#0a5c45}
.btn-sm{font-size:12px;padding:7px 14px}
.btn-block{width:100%;margin-top:8px}
.btn-add-row{width:100%;text-align:left;padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;display:flex;align-items:center;gap:6px;border-top:.5px solid var(--border)}
.btn-add-row:active{background:var(--surface2)}
.btn-del{border:none;background:none;cursor:pointer;color:var(--text3);padding:4px 6px;font-size:16px}
.btn-del:active{color:var(--red)}
.btn-icon{border:none;background:none;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:var(--rsm)}

/* Field */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{padding:11px 13px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--surface);color:var(--text);outline:none;width:100%}
.field input:focus,.field select:focus{border-color:var(--text)}

/* Section block (input form) */
.sec-block{border:.5px solid var(--border);border-radius:var(--rsm);margin-bottom:10px;overflow:hidden;background:var(--surface)}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2)}
.sec-head-left{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.sec-sub{font-size:13px;font-weight:700}
.detail-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:.5px solid var(--border)}
.dr-name{flex:1.5}
.dr-name input{width:100%;border:none;background:transparent;outline:none;font-size:14px;color:var(--text)}
.dr-name input::placeholder{color:var(--text3)}
.dr-amt{display:flex;align-items:center;gap:4px;flex:1}
.dr-amt input{width:100%;text-align:right;font-size:14px;border:none;background:transparent;outline:none}
.dr-unit{font-size:12px;color:var(--text2);white-space:nowrap}

/* Sum rows */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:.5px solid var(--border)}
.sum-row.total{border-top:1.5px solid var(--text);margin-top:4px;padding-top:13px}

/* Badge */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.bg-green{background:var(--green-bg);color:var(--green)}
.bg-red{background:var(--red-bg);color:var(--red)}
.bg-amber{background:var(--amber-bg);color:var(--amber)}
.bg-blue{background:var(--blue-bg);color:var(--blue)}
.bg-gray{background:var(--surface2);color:var(--text2)}

/* Banner */
.banner{border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px}

/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-box{background:var(--surface);border-radius:var(--r);padding:28px 24px;width:100%;max-width:360px;border:.5px solid var(--border)}
.login-err{font-size:13px;color:var(--red);background:var(--red-bg);padding:10px 14px;border-radius:var(--rsm);margin-bottom:14px;display:none}

/* Role select */
.role-card{background:var(--surface);border-radius:var(--r);padding:20px;border:.5px solid var(--border);display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:12px;width:100%;text-align:left}
.role-card:active{background:var(--surface2)}

/* Store select */
.store-card{background:var(--surface);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:.5px solid var(--border);width:100%}
.store-card:active{background:var(--surface2)}

/* Dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-g{background:#1D9E75}.dot-r{background:#E24B4A}.dot-gray{background:#B4B2A9}
.notify-badge{background:#E24B4A;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:5px;font-weight:700}

/* AI panel */
.ai-panel{background:var(--purple-bg);border:.5px solid #c5bcf0;border-radius:var(--r);padding:16px;margin-bottom:12px}
.drop-zone{border:2px dashed #a99ee0;border-radius:var(--rsm);padding:28px 16px;text-align:center;cursor:pointer;color:var(--purple)}
.drop-zone i{font-size:40px;display:block;margin-bottom:10px;opacity:.7}
.ai-result{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rsm);padding:14px;margin-top:12px;display:none}
.ai-result.show{display:block}
.ai-result-row{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--border);gap:10px}
.ai-result-row:last-of-type{border-bottom:none}
.thinking{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--purple);padding:12px 0}
.spin{width:16px;height:16px;border:2px solid rgba(74,58,154,.2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
.spin-sm{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* HQ store card */
.hq-store-card{background:var(--surface);border-radius:var(--r);margin-bottom:14px;border:.5px solid var(--border);overflow:hidden}
.hq-store-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.hq-store-card-body{padding:0 16px 16px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{border-radius:var(--rsm);padding:11px 13px}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase}
.kpi-val{font-size:19px;font-weight:700}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cost-box{border-radius:var(--rsm);padding:10px 12px}
.cost-label{font-size:10px;font-weight:700;margin-bottom:3px}
.cost-val{font-size:16px;font-weight:700}
.cost-sub{font-size:10px;margin-top:3px;opacity:.8}

/* Detail table in HQ */
.detail-sec{margin-bottom:10px}
.detail-sec-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--rsm);margin-bottom:2px}
.detail-sec-head-label{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.detail-item{display:flex;justify-content:space-between;padding:7px 12px 7px 26px;border-bottom:.5px solid var(--border);font-size:13px}
.detail-item:last-child{border-bottom:none}

/* Info box */
.info-box{background:var(--surface2);border-radius:var(--rsm);padding:12px 14px;font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}

/* Store edit row */
.store-edit-row{padding:14px 0;border-bottom:.5px solid var(--border)}
.store-edit-row:last-child{border-bottom:none}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;z-index:9999;display:none;white-space:nowrap}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const HQ_PW = 'Nari1227';
const SK = 'hq_v6_';

const DEFAULT_STORES = [
  {id:'s1',name:'本店',manager:'田中 一郎'},
  {id:'s2',name:'北口店',manager:'鈴木 花子'},
  {id:'s3',name:'南店',manager:'佐藤 次郎'},
];

let state = {role:null, storeId:null, storeName:null};
let formData = {};
let receiptResult = null;

// ── Storage ──
function lsSet(k,v){try{localStorage.setItem(SK+k,JSON.stringify(v));}catch(e){}}
function lsGet(k){try{const r=localStorage.getItem(SK+k);return r?JSON.parse(r):null;}catch(e){return null;}}
function getStores(){return lsGet('stores')||DEFAULT_STORES;}
function saveStores(a){lsSet('stores',a);}
function saveRec(r){lsSet('rec_'+r.storeId+'_'+r.month,r);}
function loadRec(sid,mo){return lsGet('rec_'+sid+'_'+mo);}
function loadAllForMonth(mo){return getStores().map(s=>loadRec(s.id,mo)).filter(Boolean);}
function loadStoreHistory(sid){
  return Object.keys(localStorage)
    .filter(k=>k.startsWith(SK+'rec_'+sid+'_'))
    .map(k=>{try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}})
    .filter(Boolean).sort((a,b)=>b.month.localeCompare(a.month));
}

// ── Helpers ──
function uid(){return'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmt(n){return'¥'+Math.round(n||0).toLocaleString('ja-JP');}
function ym(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function sumItems(arr){return(arr||[]).reduce((s,i)=>s+(parseFloat(i.amount)||0),0);}
function incomeOf(r){
  if(!r)return 0;
  if(r.storeId==='s1'){
    const ins=['ins_shakai','ins_kokuho','ins_kaigo','ins_jibai','ins_rousai','ins_seishin'];
    const shisetsu=['shisetsu_green','shisetsu_togen','shisetsu_fukugi','shisetsu_zaitaku'];
    return (parseFloat(r.madoguchi)||0)
      +ins.reduce((s,k)=>s+(parseFloat(r[k])||0),0)
      +shisetsu.reduce((s,k)=>s+(parseFloat(r[k])||0),0)
      +(parseFloat(r.yachin)||0)+(parseFloat(r.card)||0)
      +sumItems(r.otherIncome);
  } else {
    // 北口・南店
    return sumItems(r.sales)+sumItems(r.gaishutsu)+sumItems(r.otherIncome);
  }
}
function fixedOf(r){
  if(!r)return 0;
  if(r.storeId==='s1'){
    const utils=['water1f','water2f','elec1f1','elec1f2','elec2f','gas1f','gas2f'];
    return sv1(r,'labor_yamasiro')+sv1(r,'labor_murakami')+sv1(r,'labor_bonus')
      +(sv1(r,'rent_daito')||78170)+(sv1(r,'rent_meiko')||80110)
      +utils.reduce((s,k)=>s+sv1(r,k),0)
      +(sv1(r,'daiichi')||24669)+sv1(r,'yakuzaishi');
  } else {
    return sumItems(r.rent)+sumItems(r.utilities)+sumItems(r.otherFixed);
  }
}
function miscOf(r){
  if(!r||r.storeId!=='s1')return 0;
  const DEF={kakehashi:47278,ricoh:117480,docomo:4433,ryugin:2200,orico:133320,ryuanzen:12100,nisseiCar:6450,nisseiYama:18377,nisseiLife:12460,nhk:1930};
  return sv1(r,'hikari')
    +(sv1(r,'kakehashi')||DEF.kakehashi)+(sv1(r,'ricoh')||DEF.ricoh)
    +sv1(r,'fujifilm')+sv1(r,'sharp')
    +(sv1(r,'docomo')||DEF.docomo)+(sv1(r,'ryugin')||DEF.ryugin)
    +(sv1(r,'orico')||DEF.orico)+(sv1(r,'ryuanzen')||DEF.ryuanzen)
    +sv1(r,'ryudc')
    +(sv1(r,'nisseiCar')||DEF.nisseiCar)+(sv1(r,'nisseiYama')||DEF.nisseiYama)
    +(sv1(r,'nisseiLife')||DEF.nisseiLife)+(sv1(r,'nhk')||DEF.nhk);
}
function varOf(r){
  if(!r)return 0;
  return sumItems(r.kaitori)+sumItems(r.otherVar);
}
function publicOf(r){
  if(!r)return 0;
  if(r.storeId==='s1'){
    return sv1(r,'kouseiNenkin')+sv1(r,'tax_shakai')+sv1(r,'tax_hojin')+sv1(r,'tax_shikenmin')+sv1(r,'tax_kotei')+sv1(r,'kouko_repay')+sv1(r,'tax_other');
  } else {
    return sv1(r,'k_kouseiNenkin')+sv1(r,'k_tax_shakai')+sv1(r,'k_tax_hojin')+sv1(r,'k_tax_shikenmin')+sv1(r,'k_tax_kotei')+sv1(r,'k_kouko_repay')+sv1(r,'k_tax_other');
  }
}
function costsOf(r){return fixedOf(r)+miscOf(r)+varOf(r)+publicOf(r);}
function sv1(r,k){return parseFloat(r?.[k])||0;}
function el(id){return document.getElementById(id);}
function toast(msg){const t=el('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2400);}

// ══════════ スタッフ入力用（収入・仕入れのみ）══════════
const SECTIONS_honten_staff = [
  {key:'madoguchi',label:'窓口収入',icon:'ti-cash',color:'#1a4f8a',ph:'金額を入力',single:true},
  {key:'ins_shakai',label:'社会保険',icon:'ti-heart-rate-monitor',color:'#1a4f8a',single:true},
  {key:'ins_kokuho',label:'国民健康保険',icon:'ti-heart-rate-monitor',color:'#1a4f8a',single:true},
  {key:'ins_kaigo',label:'介護保険',icon:'ti-heart-rate-monitor',color:'#1a4f8a',single:true},

  {key:'shisetsu_green',label:'施設｜グリーンハウス山宗',icon:'ti-building-community',color:'#0f6e56',single:true},
  {key:'shisetsu_togen',label:'施設｜桃源の郷',icon:'ti-building-community',color:'#0f6e56',single:true},
  {key:'shisetsu_fukugi',label:'施設｜ふくぎの里',icon:'ti-building-community',color:'#0f6e56',single:true},
  {key:'shisetsu_zaitaku',label:'在宅訪問',icon:'ti-home-heart',color:'#0f6e56',single:true},
  {key:'yachin',label:'家賃収入',icon:'ti-home-dollar',color:'#1a4f8a',single:true},
  {key:'card',label:'カード収入',icon:'ti-credit-card',color:'#1a4f8a',single:true},
  {key:'otherIncome',label:'その他収入',icon:'ti-coins',color:'#1a4f8a',ph:'例：補助金、雑収入'},
  {key:'tax',label:'消費税（預り）',icon:'ti-percentage',color:'#6b6a64',single:true},
  {key:'rent_daito',label:'大東建託',icon:'ti-home',color:'#b03020',single:true,defaultVal:78170},
  {key:'rent_meiko',label:'明光不動産',icon:'ti-home',color:'#b03020',single:true,defaultVal:80110},
  {key:'water1f',label:'水道 1F',icon:'ti-droplet',color:'#b03020',single:true},
  {key:'water2f',label:'水道 2F',icon:'ti-droplet',color:'#b03020',single:true},
  {key:'elec1f1',label:'電気 1F-1',icon:'ti-bolt',color:'#b03020',single:true},
  {key:'elec1f2',label:'電気 1F-2',icon:'ti-bolt',color:'#b03020',single:true},
  {key:'elec2f',label:'電気 2F',icon:'ti-bolt',color:'#b03020',single:true},
  {key:'gas1f',label:'ガス 1F',icon:'ti-flame',color:'#b03020',single:true},
  {key:'gas2f',label:'ガス 2F',icon:'ti-flame',color:'#b03020',single:true},
  {key:'daiichi',label:'第一生命',icon:'ti-shield',color:'#b03020',single:true,defaultVal:24669},
  {key:'yakuzaishi',label:'沖）薬剤師会',icon:'ti-medical-cross',color:'#b03020',single:true},
  {key:'kouseiNenkin',label:'厚生年金',icon:'ti-shield-check',color:'#7b1fa2',single:true,public:true},
  {key:'tax_shakai',label:'社会保険料',icon:'ti-shield-check',color:'#7b1fa2',single:true,public:true},
  {key:'tax_hojin',label:'法人税',icon:'ti-building-bank',color:'#7b1fa2',single:true,public:true},
  {key:'tax_shikenmin',label:'市県民税',icon:'ti-building-community',color:'#7b1fa2',single:true,public:true},
  {key:'tax_kotei',label:'固定資産税',icon:'ti-home-2',color:'#7b1fa2',single:true,public:true},
  {key:'kouko_repay',label:'公庫借入返済',icon:'ti-building-bank',color:'#7b1fa2',single:true,public:true},
  {key:'tax_other',label:'その他公的支払い',icon:'ti-receipt-tax',color:'#7b1fa2',single:true,public:true},
  {key:'hikari',label:'光通信工業',icon:'ti-wifi',color:'#5a4200',single:true},
  {key:'kakehashi',label:'カケハシJCB',icon:'ti-credit-card',color:'#5a4200',single:true,defaultVal:47278},
  {key:'ricoh',label:'リコーリース',icon:'ti-printer',color:'#5a4200',single:true,defaultVal:117480},
  {key:'fujifilm',label:'富士フィルム',icon:'ti-camera',color:'#5a4200',single:true},
  {key:'sharp',label:'シャープファイナンス',icon:'ti-device-laptop',color:'#5a4200',single:true},
  {key:'docomo',label:'ドコモビジネス',icon:'ti-device-mobile',color:'#5a4200',single:true,defaultVal:4433},
  {key:'ryugin',label:'琉銀BIZネット',icon:'ti-building-bank',color:'#5a4200',single:true,defaultVal:2200},
  {key:'orico',label:'オリコ',icon:'ti-credit-card',color:'#5a4200',single:true,defaultVal:133320},
  {key:'ryuanzen',label:'琉球保安',icon:'ti-shield',color:'#5a4200',single:true,defaultVal:12100},
  {key:'ryudc',label:'琉球DC',icon:'ti-server',color:'#5a4200',single:true},
  {key:'nisseiCar',label:'車ニッセイ保険',icon:'ti-car',color:'#5a4200',single:true,defaultVal:6450},
  {key:'nisseiYama',label:'ニッセイ生命（山城）',icon:'ti-shield-check',color:'#5a4200',single:true,defaultVal:18377},
  {key:'nisseiLife',label:'ニッセイ生命保険',icon:'ti-shield-check',color:'#5a4200',single:true,defaultVal:12460},
  {key:'nhk',label:'NHK受信料',icon:'ti-antenna',color:'#5a4200',single:true,defaultVal:1930},
  {key:'otherVar',label:'その他変動費',icon:'ti-receipt-2',color:'#8a6200',ph:'例：消耗品、広告費'},
];
const CATS_honten_staff = [

function initFormData(rec){
  formData={};
  const DEFAULTS=state.storeId==='s1'?{
    rent_daito:78170,rent_meiko:80110,
    kakehashi:47278,ricoh:117480,docomo:4433,ryugin:2200,
    orico:133320,ryuanzen:12100,daiichi:24669,
    nisseiCar:6450,nisseiYama:18377,nisseiLife:12460,nhk:1930,
  }:{};
  SECTIONS.forEach(s=>{
    if(s.single){
      const saved=rec?.[s.key];
      formData[s.key]=(saved!=null&&saved!=='')?saved:(DEFAULTS[s.key]??'');
    }else{
      formData[s.key]=(rec&&rec[s.key]&&rec[s.key].length)
        ?rec[s.key].map(i=>({...i}))
        :[{id:uid(),name:'',amount:''}];
    }
  });
}

  <div class="login-wrap">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:24px">
        <i class="ti ti-medical-cross" style="font-size:52px;color:var(--text2)"></i>
        <div style="font-size:20px;font-weight:800;margin-top:10px">${name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">パスワードを入力してください</div>
      </div>
      <div id="store-login-err" class="login-err">パスワードが違います</div>
      <div class="field"><label>パスワード</label>
        <input type="password" id="store-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doStoreLogin('${id}','${name}')">
      </div>
      <button class="btn btn-primary btn-block" onclick="doStoreLogin('${id}','${name}')"><i class="ti ti-login"></i> ログイン</button>
      <button class="btn btn-block" style="margin-top:8px" onclick="renderRoleSelect()"><i class="ti ti-arrow-left"></i> 戻る</button>
    </div>
  </div>`;
  setTimeout(()=>el('store-pw')?.focus(),100);
}

function doStoreLogin(id, name){
  if(el('store-pw').value===HQ_PW){
    state.role='store';
    selectStore(id, name);
  } else {
    el('store-login-err').style.display='block';
  }
}

function renderStoreSelect(){
  const stores=getStores();
  el('app').innerHTML=`
  <div class="topbar">
    <button class="btn-icon" onclick="renderRoleSelect()"><i class="ti ti-arrow-left" style="font-size:20px"></i></button>
    <div><div class="topbar-title">店舗を選択</div></div>
    <div style="width:36px"></div>
  </div>
  <div style="padding:16px">
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px">あなたの店舗を選択してください</div>
    ${stores.map(s=>`
    <button class="store-card" onclick="selectStore('${s.id}','${s.name}')">
      <div>
        <div style="font-size:16px;font-weight:700">${s.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px">${s.manager||''}</div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text3);font-size:20px"></i>

function selectStore(id,name){
  state.storeId=id;state.storeName=name;
  SECTIONS=getStaffSections(id);
  CATS=getStaffCats(id);
  renderStoreApp();
}

function swSTab(tab){
  ['input','purchase','receipt','history'].forEach(t=>{
    el('st-'+t)?.classList.toggle('active',t===tab);
    const p=el('pane-'+t);if(p)p.style.display=t===tab?'block':'none';
  });
  if(tab==='history')loadHistory();
  if(tab==='purchase'&&state.storeId==='s1')loadPurchaseForm();
}

    const borderStyle=isPub?'border:1.5px solid #7b1fa2;background:#fdf4ff;':'';

    const inner=el('cat-in-'+cat.keys[0]);
    cat.keys.forEach(key=>{
      const sec=SECTIONS.find(s=>s.key===key);
      if(sec.single){
        // 賞与月（3・8・12月）以外は非表示

        row.className='sec-block';

          <div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:${sec.color}">
            <i class="ti ${sec.icon}"></i>${sec.label}${isBonusMo?' <span style="font-size:10px;background:#f57f17;color:#fff;padding:2px 6px;border-radius:10px;margin-left:4px">今月</span>':''}

          <div style="display:flex;align-items:center;gap:6px">
            <input type="number" id="sf-${key}" value="${formData[key]||''}" placeholder="0" min="0" inputmode="numeric"

              oninput="formData['${key}']=parseFloat(this.value)||0;recalc()">
            <span style="font-size:12px;color:var(--text2)">円</span>
          </div>
        </div>`;
        inner.appendChild(row);
      }else{
        // 明細入力（収入・人件費・買取など）
        const blk=document.createElement('div');
        blk.className='sec-block';blk.id='blk-'+key;
        blk.innerHTML=`<div class="sec-head">
          <div class="sec-head-left" style="color:${sec.color}"><i class="ti ${sec.icon}"></i>${sec.label}</div>
          <span class="sec-sub" style="color:${sec.color}" id="sub-${key}">${fmt(sumItems(formData[key]))}</span>
        </div>
        <div id="rows-${key}"></div>
        <button class="btn-add-row" onclick="addRow('${key}')"><i class="ti ti-plus"></i> 明細を追加</button>`;

function renderRows(key){
  const c=el('rows-'+key);if(!c)return;
  const sec=SECTIONS.find(s=>s.key===key);
  c.innerHTML='';
  (formData[key]||[]).forEach(item=>appendRowEl(key,item,sec,c));
}

function appendRowEl(key,item,sec,c){
  if(!sec)sec=SECTIONS.find(s=>s.key===key);
  if(!c)c=el('rows-'+key);
  if(!c)return;
  const row=document.createElement('div');
  row.className='detail-row';row.id='dr-'+item.id;
  row.innerHTML=`<div class="dr-name"><input type="text" placeholder="${sec.ph}" value="${item.name||''}" inputmode="text" oninput="updateItem('${key}','${item.id}','name',this.value)"></div>
    <div class="dr-amt"><input type="number" placeholder="0" value="${item.amount||''}" min="0" inputmode="numeric" style="color:${sec.color}" oninput="updateItem('${key}','${item.id}','amount',parseFloat(this.value)||0)"><span class="dr-unit">円</span></div>
    <button class="btn-del" onclick="removeRow('${key}','${item.id}')"><i class="ti ti-x"></i></button>`;
  c.appendChild(row);
}

function addRow(key){
  const item={id:uid(),name:'',amount:''};
  formData[key].push(item);
  appendRowEl(key,item,null,null);
  el('dr-'+item.id)?.querySelector('input[type=text]')?.focus();
  recalc();
}

function removeRow(key,id){
  if((formData[key]||[]).length<=1){
    const it=formData[key].find(i=>i.id===id);
    if(it){it.name='';it.amount='';}
    el('dr-'+id)?.querySelectorAll('input').forEach(e=>e.value='');
    recalc();return;
  }
  formData[key]=formData[key].filter(i=>i.id!==id);
  el('dr-'+id)?.remove();
  recalc();
}

function updateItem(key,id,field,val){
  const it=(formData[key]||[]).find(i=>i.id===id);
  if(it)it[field]=val;
  recalc();
}

function recalc(){
  const sid=state.storeId;
  let inc=0,fix=0,misc=0,pub=0,vr=0,lab=0,mad=0,ins=0,shisetsu=0,yachin=0,card=0;

  if(sid==='s1'){
    // 本店専用計算
    mad=parseFloat(formData.madoguchi)||0;
    const insKeys=['ins_shakai','ins_kokuho','ins_kaigo','ins_jibai','ins_rousai','ins_seishin'];
    const shisetsuKeys=['shisetsu_green','shisetsu_togen','shisetsu_fukugi','shisetsu_zaitaku'];
    ins=insKeys.reduce((s,k)=>s+(parseFloat(formData[k])||0),0);
    shisetsu=shisetsuKeys.reduce((s,k)=>s+(parseFloat(formData[k])||0),0);
    yachin=parseFloat(formData.yachin)||0;
    card=parseFloat(formData.card)||0;
    inc=mad+ins+shisetsu+yachin+card+sumItems(formData.otherIncome);
    lab=(parseFloat(formData.labor_yamasiro)||0)+(parseFloat(formData.labor_murakami)||0)+(parseFloat(formData.labor_bonus)||0);
    const utils=['water1f','water2f','elec1f1','elec1f2','elec2f','gas1f','gas2f'];
    fix=lab
      +(parseFloat(formData.rent_daito)||78170)
      +(parseFloat(formData.rent_meiko)||80110)
      +utils.reduce((s,k)=>s+(parseFloat(formData[k])||0),0)
      +(parseFloat(formData.daiichi)||24669)
      +(parseFloat(formData.yakuzaishi)||0);
    const miscKeys=['hikari','kakehashi','ricoh','fujifilm','sharp','docomo','ryugin','orico','ryuanzen','ryudc','nisseiCar','nisseiYama','nisseiLife','nhk'];
    const DEF={kakehashi:47278,ricoh:117480,docomo:4433,ryugin:2200,orico:133320,ryuanzen:12100,nisseiCar:6450,nisseiYama:18377,nisseiLife:12460,nhk:1930};
    misc=miscKeys.reduce((s,k)=>s+(parseFloat(formData[k])||DEF[k]||0),0);
    const pubKeys=['kouseiNenkin','tax_shakai','tax_hojin','tax_shikenmin','tax_kotei','kouko_repay','tax_other'];
    pub=pubKeys.reduce((s,k)=>s+(parseFloat(formData[k])||0),0);
    vr=sumItems(formData.otherVar);
  } else {
    // 北口・南店：入力した金額だけ集計（デフォルト値なし）
    inc=sumItems(formData.sales)+sumItems(formData.gaishutsu)+sumItems(formData.otherIncome);
    fix=sumItems(formData.rent)+sumItems(formData.utilities)+sumItems(formData.otherFixed);
    vr=sumItems(formData.kaitori)+sumItems(formData.otherVar);
    const pubKeys=['k_kouseiNenkin','k_tax_shakai','k_tax_hojin','k_tax_shikenmin','k_tax_kotei','k_kouko_repay','k_tax_other'];
    pub=pubKeys.reduce((s,k)=>s+(parseFloat(formData[k])||0),0);
  }

  const prf=inc-fix-misc-pub-vr;

  // サブ合計更新（明細系）
  ['otherIncome','labor','rent','kaitori','otherVar','sales','gaishutsu','utilities','otherFixed'].forEach(k=>{
    const e=el('sub-'+k);if(e)e.textContent=fmt(sumItems(formData[k]));
  });

  // カテゴリ合計更新
  CATS.forEach(cat=>{
    const e=el('cat-tot-'+cat.keys[0]);if(!e)return;
    const t=cat.keys.reduce((s,k)=>{
      const sec=SECTIONS.find(x=>x.key===k);
      return s+(sec?.single?(parseFloat(formData[k])||0):sumItems(formData[k]));
    },0);
    e.textContent=fmt(t);
  });

  const sv=(id,v)=>{const e=el(id);if(e)e.textContent=fmt(v);};
  sv('ss-inc',inc);sv('ss-mad',mad);sv('ss-ins',ins);sv('ss-shisetsu',shisetsu);sv('ss-yachin',yachin);sv('ss-card',card);
  sv('ss-fix',fix);sv('ss-lab',lab);sv('ss-misc',misc);sv('ss-pub',pub);sv('ss-var',vr);
  const p=el('ss-prf');if(p){p.textContent=fmt(prf);p.style.color=prf>=0?'var(--green)':'var(--red)';}
}

function loadStoreForm(){
  const mo=el('s-month')?.value;if(!mo)return;
  const rec=loadRec(state.storeId,mo);
  initFormData(rec);
  renderFormSections();
  const memo=el('f-memo');if(memo)memo.value=rec?.memo||'';
  recalc();
  updateStatusBar(rec);
}

function updateStatusBar(rec){
  const bar=el('status-bar');if(!bar)return;
  if(!rec){bar.innerHTML='';return;}
  if(rec.sentToHQ){
    bar.innerHTML=`<div class="banner" style="background:var(--green-bg);border:.5px solid #9FE1CB">
      <span style="color:var(--green);font-size:13px"><span class="dot dot-g"></span>本社送信済み — ${new Date(rec.sentAt).toLocaleString('ja-JP')}</span>
      <button class="btn btn-sm" onclick="sendToHQ()"><i class="ti ti-refresh"></i> 再送信</button>
    </div>`;
  }else{
    bar.innerHTML=`<div class="banner" style="background:var(--red-bg);border:.5px solid #F7C1C1;color:var(--red);font-size:13px">
      <span><span class="dot dot-r"></span>下書き保存済み — 本社への送信がまだです</span>
    </div>`;
  }
}

function buildRecord(sentToHQ){
  const rec={storeId:state.storeId,storeName:state.storeName,month:el('s-month')?.value,memo:el('f-memo')?.value||'',sentToHQ,updatedAt:new Date().toISOString(),sentAt:sentToHQ?new Date().toISOString():null};
  SECTIONS.forEach(s=>{
    if(s.single){
      rec[s.key]=parseFloat(formData[s.key])||0;
    }else{
      rec[s.key]=(formData[s.key]||[]).filter(i=>i.name||i.amount).map(i=>({id:i.id,name:i.name||'',amount:parseFloat(i.amount)||0}));
    }
  });
  return rec;
}

function addMonths(ym,n){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+n,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function handleFile(e){const f=e.target.files[0];if(f)processImage(f);}
async function processImage(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result.split(',')[1],mt=file.type;
    el('receipt-img').src=e.target.result;
    el('preview-wrap').style.display='block';
    el('ai-thinking').style.display='flex';
    el('ai-result').classList.remove('show');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:`このレシート・領収書・請求書の画像を読み取ってください。
以下のJSON形式のみで返答してください。マークダウンや説明文は不要です。

{"store_name":"店舗・会社名（不明なら空文字）","date":"日付YYYY-MM-DD形式（不明なら空文字）","items":[{"name":"品目名や内容","amount":半角数字の金額,"category":"窓口収入|出先収入|人件費|家賃|水道光熱費|その他固定費|買取|その他変動費|消費税","confidence":"高|中|低"}]}

・amountは半角数字のみ（¥や円は不要）
・読み取れない項目はitemsを空配列にする
・合計金額は含めず、明細ごとに分けて返す`}
        ]}]})
      });
      const data=await res.json();
      el('ai-thinking').style.display='none';
      const raw=data.content.map(c=>c.text||'').join('');
      const match=raw.match(/\{[\s\S]*\}/);
      if(!match)throw new Error('AIの返答を解析できませんでした。もう一度お試しください。');
      receiptResult=JSON.parse(match[0]);
      if(!receiptResult.items)receiptResult.items=[];
      renderReceiptResult();
    }catch(err){
      el('ai-thinking').style.display='none';
      el('ai-result-items').innerHTML=`<div style="color:var(--red);font-size:13px">読み取りエラー: ${err.message}</div>`;
      el('ai-result').classList.add('show');
    }
  };
  reader.readAsDataURL(file);
}

function renderReceiptResult(){
  if(!receiptResult)return;

}

function applyReceipt(){

  const map={'窓口収入':'madoguchi','出先収入':'desaki','人件費':'labor','家賃':'rent','水道光熱費':'utilities','その他固定費':'otherFixed','買取':'kaitori','その他変動費':'otherVar','消費税':'tax'};
  receiptResult.items.forEach(item=>{
    const key=map[item.category];if(!key)return;

  const wrap=el('hqi-form');if(!wrap)return;

  cats.forEach(cat=>{
    const isPub=cat.public;

    div.style.cssText=isPub?'border:1.5px solid #7b1fa2;background:#fdf4ff;margin-bottom:12px;border-radius:var(--r);padding:16px;':'';
    if(!isPub)div.className='card';

      <div style="font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${isPub?'#7b1fa2':'var(--text2)'};display:flex;align-items:center;gap:6px">
        ${isPub?'<i class="ti ti-alert-triangle" style="color:#7b1fa2"></i>':'<i class="ti '+cat.icon+'"></i>'}${cat.label}
      </div>
    </div>
    ${isPub?'<div style="font-size:11px;color:#7b1fa2;margin-bottom:10px">市・国・県への支払い — 重要</div>':''}
    <div id="hqi-cat-${cat.keys[0]}"></div>`;
    wrap.appendChild(div);
    const inner=el('hqi-cat-'+cat.keys[0]);
    cat.keys.forEach(key=>{
      const sec=secs.find(s=>s.key===key);if(!sec)return;
      if(sec.bonusOnly&&![3,8,12].includes(moNum))return;
      if(sec.single){
        const row=document.createElement('div');
        row.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:.5px solid var(--border)">

        inner.appendChild(blk);
        const rowWrap=el('hqirows-'+key);
        (hqFormData[key]||[]).forEach(item=>{
          const row=document.createElement('div');
          row.className='detail-row';row.id='hqidr-'+item.id;
          row.innerHTML=`<div class="dr-name"><input type="text" placeholder="${sec.ph||'名称'}" value="${item.name||''}" oninput="updateHQIItem('${key}','${item.id}','name',this.value)"></div>
            <div class="dr-amt"><input type="number" placeholder="0" value="${item.amount||''}" min="0" inputmode="numeric" style="color:${sec.color}" oninput="updateHQIItem('${key}','${item.id}','amount',parseFloat(this.value)||0)"><span class="dr-unit">円</span></div>
            <button class="btn-del" onclick="removeHQIRow('${key}','${item.id}')"><i class="ti ti-x"></i></button>`;

  btnWrap.innerHTML=`<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="saveHQInput()"><i class="ti ti-device-floppy"></i> 代表者入力を保存</button>`;
  wrap.appendChild(btnWrap);
}

function addHQIRow(key){
  const item={id:uid(),name:'',amount:''};
  (hqFormData[key]=hqFormData[key]||[]).push(item);
  const wrap=el('hqirows-'+key);if(!wrap)return;
  const secs=getHQSections(el('hqi-store')?.value||'s1');
  const sec=secs.find(s=>s.key===key);
  const row=document.createElement('div');
  row.className='detail-row';row.id='hqidr-'+item.id;
  row.innerHTML=`<div class="dr-name"><input type="text" placeholder="${sec?.ph||'名称'}" value="" oninput="updateHQIItem('${key}','${item.id}','name',this.value)"></div>
    <div class="dr-amt"><input type="number" placeholder="0" value="" min="0" inputmode="numeric" style="color:${sec?.color||'#b03020'}" oninput="updateHQIItem('${key}','${item.id}','amount',parseFloat(this.value)||0)"><span class="dr-unit">円</span></div>
    <button class="btn-del" onclick="removeHQIRow('${key}','${item.id}')"><i class="ti ti-x"></i></button>`;
  wrap.appendChild(row);
  row.querySelector('input[type=text]')?.focus();
}

function updateHQIItem(key,id,field,val){
  const item=(hqFormData[key]||[]).find(i=>i.id===id);
  if(item)item[field]=val;
}

function removeHQIRow(key,id){
  if((hqFormData[key]||[]).length<=1){
    const it=hqFormData[key]?.find(i=>i.id===id);
    if(it){it.name='';it.amount='';}
    el('hqidr-'+id)?.querySelectorAll('input').forEach(e=>e.value='');
    return;
  }
  hqFormData[key]=hqFormData[key].filter(i=>i.id!==id);
  el('hqidr-'+id)?.remove();
}

function saveHQInput(){
  const sid=el('hqi-store')?.value,mo=el('hqi-month')?.value;
  if(!sid||!mo)return;
  const secs=getHQSections(sid);
  const data={storeId:sid,month:mo,savedAt:new Date().toISOString()};
  secs.forEach(s=>{
    if(s.single)data[s.key]=parseFloat(hqFormData[s.key])||0;
    else data[s.key]=(hqFormData[s.key]||[]).filter(i=>i.name||i.amount).map(i=>({...i}));
  });
  lsSet('hq_'+sid+'_'+mo,data);
  const msg=el('hqi-save-msg');
  if(msg){msg.textContent='保存しました！';msg.style.display='block';setTimeout(()=>msg.style.display='none',2500);}
  toast('代表者入力を保存しました！');
}


function refreshReport(){
  const mo=el('d-month')?.value||ym();

        <div class="kpi-grid">
          <div class="kpi" style="background:var(--blue-bg)">
            <div class="kpi-label" style="color:var(--blue)">収入合計</div>
            <div class="kpi-val" style="color:var(--blue)">${fmt(inc)}</div>
          </div>
          <div class="kpi" style="background:${netProfit>=0?'var(--green-bg)':'var(--red-bg)'}">
            <div class="kpi-label" style="color:${netProfit>=0?'var(--green)':'var(--red)'}">営業利益</div>
            <div class="kpi-val" style="color:${netProfit>=0?'var(--green)':'var(--red)'}">${fmt(netProfit)}</div>
            <div style="font-size:10px;color:${netProfit>=0?'var(--green)':'var(--red)'};margin-top:3px;opacity:.8">利益率 ${mg!==null?mg.toFixed(1)+'%':'—'}</div>
          </div>
        </div>
        <div style="margin-top:10px;border:.5px solid var(--border);border-radius:var(--rsm);overflow:hidden">
          <div style="background:var(--surface2);padding:8px 12px;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.05em">支払い内訳</div>
          ${laborTotal>0?`<div style="display:flex;justify-content:space-between;padding:8px 12px;border-top:.5px solid var(--border);font-size:13px">
            <span style="color:var(--text2)">人件費・役員報酬</span><span style="font-weight:700;color:var(--red)">${fmt(laborTotal)}</span>
          </div>`:''}
          ${fix>0?`<div style="display:flex;justify-content:space-between;padding:8px 12px;border-top:.5px solid var(--border);font-size:13px">
            <span style="color:var(--text2)">固定費</span><span style="font-weight:700;color:var(--red)">${fmt(fix)}</span>
          </div>`:''}
          ${misc>0?`<div style="display:flex;justify-content:space-between;padding:8px 12px;border-top:.5px solid var(--border);font-size:13px">
            <span style="color:var(--text2)">諸経費</span><span style="font-weight:700;color:#5a4200">${fmt(misc)}</span>

            <span style="color:#7b1fa2;font-weight:600">公的支払い</span><span style="font-weight:700;color:#7b1fa2">${fmt(pub)}</span>

function refreshPayment(){
  const payMo=el('pay-month')?.value||ym();
  const stores=getStores();
  const wrap=el('payment-cards');if(!wrap)return;

  // 翌月払い → 1ヶ月前の仕入れ、翌々月払い → 2ヶ月前の仕入れ
  const purMo1=addMonths(payMo,-1);
  const purMo2=addMonths(payMo,-2);

  const recs1=stores.map(s=>({store:s,rec:loadPurchaseRec(s.id,purMo1)}));
  const recs2=stores.map(s=>({store:s,rec:loadPurchaseRec(s.id,purMo2)}));

  // 仕入先ごとの支払い合計
  const sup1List=SUPPLIERS.filter(s=>s.payOffset===1);
  const sup2List=SUPPLIERS.filter(s=>s.payOffset===2);

  const total1=recs1.reduce((s,{rec})=>s+sup1List.reduce((t,sup)=>t+(rec?.suppliers?.[sup.id]||0),0),0);
  const total2=recs2.reduce((s,{rec})=>s+sup2List.reduce((t,sup)=>t+(rec?.suppliers?.[sup.id]||0),0),0);
  const grandTotal=total1+total2;

  let html=`
  <div class="card" style="margin-bottom:14px;border-left:4px solid var(--red);border-radius:0 var(--r) var(--r) 0">
    <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">${payMo} の支払い合計</div>
    <div style="font-size:30px;font-weight:800;color:var(--red);margin-bottom:16px">${fmt(grandTotal)}</div>
    <div style="padding:10px 0;border-top:.5px solid var(--border)">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">翌月払い（${purMo1}仕入れ分）</div>
      ${sup1List.map(s=>{
        const amt=recs1.reduce((t,{rec})=>t+(rec?.suppliers?.[s.id]||0),0);
        return`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px">
          <span style="color:var(--text2)">${s.name}</span>
          <span style="font-weight:600;color:${amt>0?'var(--red)':'var(--text2)'}">${fmt(amt)}</span>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:.5px solid var(--border);margin-top:4px;font-weight:700">
        <span>小計</span><span style="color:var(--red)">${fmt(total1)}</span>
      </div>
    </div>
    <div style="padding:10px 0;border-top:.5px solid var(--border)">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">翌々月払い（${purMo2}仕入れ分）</div>
      ${sup2List.map(s=>{
        const amt=recs2.reduce((t,{rec})=>t+(rec?.suppliers?.[s.id]||0),0);
        return`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px">
          <span style="color:var(--text2)">${s.name}</span>
          <span style="font-weight:600;color:${amt>0?'var(--red)':'var(--text2)'}">${fmt(amt)}</span>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:.5px solid var(--border);margin-top:4px;font-weight:700">
        <span>小計</span><span style="color:var(--red)">${fmt(total2)}</span>
      </div>
    </div>
  </div>

  <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase">店舗別内訳</div>
  ${stores.map(s=>{
    const r1=recs1.find(x=>x.store.id===s.id)?.rec;
    const r2=recs2.find(x=>x.store.id===s.id)?.rec;
    const storeTotal1=sup1List.reduce((t,sup)=>t+(r1?.suppliers?.[sup.id]||0),0);
    const storeTotal2=sup2List.reduce((t,sup)=>t+(r2?.suppliers?.[sup.id]||0),0);
    const storeTotal=storeTotal1+storeTotal2;
    if(!r1&&!r2)return`<div class="card" style="margin-bottom:10px;opacity:.5">
      <div style="font-size:15px;font-weight:700">${s.name}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">仕入れデータなし</div>
    </div>`;
    return`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:15px;font-weight:700">${s.name}</div>
        <div style="font-size:18px;font-weight:800;color:var(--red)">${fmt(storeTotal)}</div>
      </div>
      ${storeTotal1>0?`<div style="font-size:12px;color:var(--text2);margin-bottom:4px">翌月払い分</div>
      ${sup1List.filter(sup=>(r1?.suppliers?.[sup.id]||0)>0).map(sup=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-top:.5px solid var(--border);font-size:13px">
          <span style="color:var(--text2)">${sup.name}</span><span style="font-weight:600">${fmt(r1?.suppliers?.[sup.id]||0)}</span>
        </div>`).join('')}`:''}
      ${storeTotal2>0?`<div style="font-size:12px;color:var(--text2);margin-top:8px;margin-bottom:4px">翌々月払い分</div>
      ${sup2List.filter(sup=>(r2?.suppliers?.[sup.id]||0)>0).map(sup=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-top:.5px solid var(--border);font-size:13px">
          <span style="color:var(--text2)">${sup.name}</span><span style="font-weight:600">${fmt(r2?.suppliers?.[sup.id]||0)}</span>
        </div>`).join('')}`:''}
    </div>`;
  }).join('')}`;

  wrap.innerHTML=html;
}


function refreshStatus(){
  const mo=el('status-month')?.value||ym();
  const stores=getStores(),recs=loadAllForMonth(mo);
  let unsub=0;
  const wrap=el('status-cards');if(!wrap)return;
  wrap.innerHTML=stores.map(s=>{
    const r=recs.find(x=>x.storeId===s.id);
    const emp=(r?.labor||[]).filter(i=>i.name).length;
    let dot,label,dc='—';
    if(!r){unsub++;dot='dot-gray';label='未入力';}

function updateStore(id){
  const stores=getStores(),s=stores.find(x=>x.id===id);if(!s)return;
  const n=el('sname-'+id)?.value.trim(),m=el('smgr-'+id)?.value.trim();
  if(n)s.name=n;if(m!==undefined)s.manager=m;
  saveStores(stores);renderStoreListUI();toast('店舗情報を更新しました');
}

function deleteStore(id){
  if(!confirm('この店舗を削除しますか？'))return;
  saveStores(getStores().filter(s=>s.id!==id));
  renderStoreListUI();
}

function addStore(){
  const name=el('new-store-name')?.value.trim(),mgr=el('new-store-mgr')?.value.trim();
  if(!name){toast('店舗名を入力してください');return;}
  const stores=getStores();
  stores.push({id:'s'+Date.now(),name,manager:mgr||''});
  saveStores(stores);
  el('new-store-name').value='';el('new-store-mgr').value='';
  renderStoreListUI();toast('店舗を追加しました');
}

renderRoleSelect();
