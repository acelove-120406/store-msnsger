<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="店舗管理">
<title>店舗税務管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1a1916;--text2:#6b6a64;--text3:#9b9a94;
  --green:#1a7a50;--green-bg:#e8f5ee;
  --red:#b03020;--red-bg:#fdf0ee;
  --amber:#8a6200;--amber-bg:#fdf6e3;
  --blue:#1a4f8a;--blue-bg:#eaf1fb;
  --purple:#4a3a9a;--purple-bg:#f0eeff;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;color:var(--text);font-size:15px}
input,select,textarea,button{font-family:inherit;font-size:15px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#app{min-height:100vh;padding-bottom:48px}

/* Topbar */
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:17px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap;cursor:pointer}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* Card */
.card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;border:.5px solid var(--border)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;border:.5px solid var(--border2);background:var(--surface);color:var(--text)}
.btn:active{opacity:.7}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-send{background:#0a5c45;color:#e1f5ee;border-color:#0a5c45}
.btn-sm{font-size:12px;padding:7px 14px}
.btn-block{width:100%;margin-top:8px}
.btn-add-row{width:100%;text-align:left;padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;display:flex;align-items:center;gap:6px;border-top:.5px solid var(--border)}
.btn-add-row:active{background:var(--surface2)}
.btn-del{border:none;background:none;cursor:pointer;color:var(--text3);padding:4px 6px;font-size:16px}
.btn-del:active{color:var(--red)}
.btn-icon{border:none;background:none;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:var(--rsm)}

/* Field */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{padding:11px 13px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--surface);color:var(--text);outline:none;width:100%}
.field input:focus,.field select:focus{border-color:var(--text)}

/* Section block (input form) */
.sec-block{border:.5px solid var(--border);border-radius:var(--rsm);margin-bottom:10px;overflow:hidden;background:var(--surface)}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2)}
.sec-head-left{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.sec-sub{font-size:13px;font-weight:700}
.detail-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:.5px solid var(--border)}
.dr-name{flex:1.5}
.dr-name input{width:100%;border:none;background:transparent;outline:none;font-size:14px;color:var(--text)}
.dr-name input::placeholder{color:var(--text3)}
.dr-amt{display:flex;align-items:center;gap:4px;flex:1}
.dr-amt input{width:100%;text-align:right;font-size:14px;border:none;background:transparent;outline:none}
.dr-unit{font-size:12px;color:var(--text2);white-space:nowrap}

/* Sum rows */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:.5px solid var(--border)}
.sum-row.total{border-top:1.5px solid var(--text);margin-top:4px;padding-top:13px}

/* Badge */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.bg-green{background:var(--green-bg);color:var(--green)}
.bg-red{background:var(--red-bg);color:var(--red)}
.bg-amber{background:var(--amber-bg);color:var(--amber)}
.bg-blue{background:var(--blue-bg);color:var(--blue)}
.bg-gray{background:var(--surface2);color:var(--text2)}

/* Banner */
.banner{border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px}

/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-box{background:var(--surface);border-radius:var(--r);padding:28px 24px;width:100%;max-width:360px;border:.5px solid var(--border)}
.login-err{font-size:13px;color:var(--red);background:var(--red-bg);padding:10px 14px;border-radius:var(--rsm);margin-bottom:14px;display:none}

/* Role select */
.role-card{background:var(--surface);border-radius:var(--r);padding:20px;border:.5px solid var(--border);display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:12px;width:100%;text-align:left}
.role-card:active{background:var(--surface2)}

/* Store select */
.store-card{background:var(--surface);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:.5px solid var(--border);width:100%}
.store-card:active{background:var(--surface2)}

/* Dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-g{background:#1D9E75}.dot-r{background:#E24B4A}.dot-gray{background:#B4B2A9}
.notify-badge{background:#E24B4A;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-left:5px;font-weight:700}

/* AI panel */
.ai-panel{background:var(--purple-bg);border:.5px solid #c5bcf0;border-radius:var(--r);padding:16px;margin-bottom:12px}
.drop-zone{border:2px dashed #a99ee0;border-radius:var(--rsm);padding:28px 16px;text-align:center;cursor:pointer;color:var(--purple)}
.drop-zone i{font-size:40px;display:block;margin-bottom:10px;opacity:.7}
.ai-result{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rsm);padding:14px;margin-top:12px;display:none}
.ai-result.show{display:block}
.ai-result-row{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--border);gap:10px}
.ai-result-row:last-of-type{border-bottom:none}
.thinking{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--purple);padding:12px 0}
.spin{width:16px;height:16px;border:2px solid rgba(74,58,154,.2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
.spin-sm{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* HQ store card */
.hq-store-card{background:var(--surface);border-radius:var(--r);margin-bottom:14px;border:.5px solid var(--border);overflow:hidden}
.hq-store-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.hq-store-card-body{padding:0 16px 16px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{border-radius:var(--rsm);padding:11px 13px}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase}
.kpi-val{font-size:19px;font-weight:700}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cost-box{border-radius:var(--rsm);padding:10px 12px}
.cost-label{font-size:10px;font-weight:700;margin-bottom:3px}
.cost-val{font-size:16px;font-weight:700}
.cost-sub{font-size:10px;margin-top:3px;opacity:.8}

/* Detail table in HQ */
.detail-sec{margin-bottom:10px}
.detail-sec-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--rsm);margin-bottom:2px}
.detail-sec-head-label{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.detail-item{display:flex;justify-content:space-between;padding:7px 12px 7px 26px;border-bottom:.5px solid var(--border);font-size:13px}
.detail-item:last-child{border-bottom:none}

/* Info box */
.info-box{background:var(--surface2);border-radius:var(--rsm);padding:12px 14px;font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}

/* Store edit row */
.store-edit-row{padding:14px 0;border-bottom:.5px solid var(--border)}
.store-edit-row:last-child{border-bottom:none}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;z-index:9999;display:none;white-space:nowrap}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const HQ_PW = 'Nari1227';
const SK = 'hq_v6_';

const DEFAULT_STORES = [
  {id:'s1',name:'本店',manager:'田中 一郎'},
  {id:'s2',name:'北口店',manager:'鈴木 花子'},
  {id:'s3',name:'南店',manager:'佐藤 次郎'},
];

let state = {role:null, storeId:null, storeName:null};
let formData = {};
let receiptResult = null;

// ── Storage ──
function lsSet(k,v){try{localStorage.setItem(SK+k,JSON.stringify(v));}catch(e){}}
function lsGet(k){try{const r=localStorage.getItem(SK+k);return r?JSON.parse(r):null;}catch(e){return null;}}
function getStores(){return lsGet('stores')||DEFAULT_STORES;}
function saveStores(a){lsSet('stores',a);}
function saveRec(r){lsSet('rec_'+r.storeId+'_'+r.month,r);}
function loadRec(sid,mo){return lsGet('rec_'+sid+'_'+mo);}
function loadAllForMonth(mo){return getStores().map(s=>loadRec(s.id,mo)).filter(Boolean);}
function loadStoreHistory(sid){
  return Object.keys(localStorage)
    .filter(k=>k.startsWith(SK+'rec_'+sid+'_'))
    .map(k=>{try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}})
    .filter(Boolean).sort((a,b)=>b.month.localeCompare(a.month));
}

// ── Helpers ──
function uid(){return'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmt(n){return'¥'+Math.round(n||0).toLocaleString('ja-JP');}
function ym(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function sumItems(arr){return(arr||[]).reduce((s,i)=>s+(parseFloat(i.amount)||0),0);}
function incomeOf(r){return sumItems(r?.madoguchi)+sumItems(r?.desaki)+sumItems(r?.otherIncome);}
function fixedOf(r){return sumItems(r?.labor)+sumItems(r?.rent)+sumItems(r?.utilities)+sumItems(r?.otherFixed);}
function varOf(r){return sumItems(r?.kaitori)+sumItems(r?.otherVar);}
function costsOf(r){return fixedOf(r)+varOf(r);}
function el(id){return document.getElementById(id);}
function toast(msg){const t=el('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2400);}

const SECTIONS = [
  {key:'madoguchi',label:'窓口収入',icon:'ti-cash',color:'#1a4f8a',ph:'例：現金収入'},
  {key:'desaki',label:'出先収入',icon:'ti-map-pin',color:'#1a4f8a',ph:'例：出張先収入'},
  {key:'otherIncome',label:'その他収入',icon:'ti-coins',color:'#1a4f8a',ph:'例：補助金、雑収入'},
  {key:'tax',label:'消費税（預り）',icon:'ti-percentage',color:'#6b6a64',ph:'消費税額'},
  {key:'labor',label:'人件費',icon:'ti-users',color:'#b03020',ph:'例：田中 太郎'},
  {key:'rent',label:'家賃・賃料',icon:'ti-home',color:'#b03020',ph:'例：本店家賃'},
  {key:'utilities',label:'水道光熱費',icon:'ti-bolt',color:'#b03020',ph:'例：電気代'},
  {key:'otherFixed',label:'その他固定費',icon:'ti-building',color:'#b03020',ph:'例：保険料、通信費'},
  {key:'kaitori',label:'買取・仕入れ',icon:'ti-shopping-bag',color:'#8a6200',ph:'例：商品買取'},
  {key:'otherVar',label:'その他変動費',icon:'ti-receipt-2',color:'#8a6200',ph:'例：消耗品、広告費'},
];
const CATS = [
  {label:'収入',icon:'ti-coin',color:'#1a4f8a',keys:['madoguchi','desaki','otherIncome','tax']},
  {label:'固定費',icon:'ti-building',color:'#b03020',keys:['labor','rent','utilities','otherFixed']},
  {label:'変動費・買取',icon:'ti-shopping-bag',color:'#8a6200',keys:['kaitori','otherVar']},
];

function initFormData(rec){
  formData={};
  SECTIONS.forEach(s=>{
    formData[s.key]=(rec&&rec[s.key]&&rec[s.key].length)
      ?rec[s.key].map(i=>({...i}))
      :[{id:uid(),name:'',amount:''}];
  });
}

// ══════════════════════════════
//  役割選択
// ══════════════════════════════
function renderRoleSelect(){
  el('app').innerHTML=`
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)">
    <div style="text-align:center;margin-bottom:36px">
      <i class="ti ti-building-store" style="font-size:56px;color:var(--text2)"></i>
      <div style="font-size:24px;font-weight:800;margin-top:12px;margin-bottom:6px">店舗税務管理</div>
      <div style="font-size:14px;color:var(--text2)">アクセス区分を選択してください</div>
    </div>
    <div style="width:100%;max-width:400px">
      <button class="role-card" onclick="state.role='store';renderStoreSelect()">
        <i class="ti ti-edit" style="font-size:38px;color:var(--text2)"></i>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;margin-bottom:3px">店舗スタッフ</div>
          <div style="font-size:13px;color:var(--text2)">月次データの入力・送信</div>
        </div>
        <i class="ti ti-chevron-right" style="color:var(--text3);font-size:20px"></i>
      </button>
      <button class="role-card" onclick="state.role='hq';renderHQLogin()">
        <i class="ti ti-shield-lock" style="font-size:38px;color:var(--text2)"></i>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;margin-bottom:3px">代表者</div>
          <div style="font-size:13px;color:var(--text2)">全店舗レポートの確認</div>
        </div>
        <i class="ti ti-chevron-right" style="color:var(--text3);font-size:20px"></i>
      </button>
    </div>
  </div>`;
}

// ══════════════════════════════
//  店舗スタッフ：店舗選択
// ══════════════════════════════
function renderStoreSelect(){
  const stores=getStores();
  el('app').innerHTML=`
  <div class="topbar">
    <button class="btn-icon" onclick="renderRoleSelect()"><i class="ti ti-arrow-left" style="font-size:20px"></i></button>
    <div><div class="topbar-title">店舗を選択</div></div>
    <div style="width:36px"></div>
  </div>
  <div style="padding:16px">
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px">あなたの店舗を選択してください</div>
    ${stores.map(s=>`
    <button class="store-card" onclick="selectStore('${s.id}','${s.name}')">
      <div>
        <div style="font-size:16px;font-weight:700">${s.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px">${s.manager||''}</div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text3);font-size:20px"></i>
    </button>`).join('')}
  </div>`;
}

function selectStore(id,name){state.storeId=id;state.storeName=name;renderStoreApp();}

// ══════════════════════════════
//  店舗スタッフ：入力画面
// ══════════════════════════════
function renderStoreApp(){
  el('app').innerHTML=`
  <div class="topbar">
    <button class="btn-icon" onclick="renderStoreSelect()"><i class="ti ti-arrow-left" style="font-size:20px"></i></button>
    <div>
      <div class="topbar-title">${state.storeName}</div>
      <div class="topbar-sub">入力・送信</div>
    </div>
    <button class="btn-icon" onclick="renderRoleSelect()"><i class="ti ti-logout" style="font-size:20px"></i></button>
  </div>
  <div class="tabs">
    <button class="tab active" id="st-input" onclick="swSTab('input')"><i class="ti ti-edit"></i> 月次入力</button>
    <button class="tab" id="st-receipt" onclick="swSTab('receipt')"><i class="ti ti-camera"></i> レシート読取</button>
    <button class="tab" id="st-history" onclick="swSTab('history')"><i class="ti ti-history"></i> 送信履歴</button>
  </div>

  <!-- 月次入力 -->
  <div id="pane-input" style="padding:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <label style="font-size:13px;color:var(--text2);white-space:nowrap">対象月</label>
      <input type="month" id="s-month" value="${ym()}" onchange="loadStoreForm()"
        style="flex:1;padding:9px 12px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--surface)">
    </div>
    <div id="status-bar"></div>
    <div id="form-sections"></div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
        <span>サマリー</span><span style="font-size:11px;color:var(--text2);font-weight:400">自動集計</span>
      </div>
      <div class="sum-row"><span style="color:var(--text2)">収入合計</span><span style="font-weight:700" id="ss-inc">¥0</span></div>
      <div class="sum-row"><span style="color:var(--text2);padding-left:12px;font-size:13px">うち 窓口収入</span><span style="color:var(--text2)" id="ss-mad">¥0</span></div>
      <div class="sum-row"><span style="color:var(--text2);padding-left:12px;font-size:13px">うち 出先収入</span><span style="color:var(--text2)" id="ss-des">¥0</span></div>
      <div class="sum-row"><span style="color:var(--text2)">固定費合計</span><span style="color:var(--red);font-weight:700" id="ss-fix">¥0</span></div>
      <div class="sum-row"><span style="color:var(--text2);padding-left:12px;font-size:13px">うち 人件費</span><span style="color:var(--text2)" id="ss-lab">¥0</span></div>
      <div class="sum-row"><span style="color:var(--text2)">変動費・買取合計</span><span style="color:var(--amber);font-weight:700" id="ss-var">¥0</span></div>
      <div class="sum-row total">
        <span style="font-weight:700;font-size:15px">営業利益（概算）</span>
        <span style="font-size:22px;font-weight:800" id="ss-prf">¥0</span>
      </div>
      <div style="margin-top:16px">
        <div class="field"><label>メモ・備考</label><input type="text" id="f-memo" placeholder="特記事項があれば"></div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn" style="flex:1" onclick="saveDraft()"><i class="ti ti-device-floppy"></i> 下書き</button>
          <button class="btn btn-send" style="flex:2" id="btn-send" onclick="sendToHQ()"><i class="ti ti-send"></i> 本社へ送信</button>
        </div>
      </div>
    </div>
  </div>

  <!-- レシート読取 -->
  <div id="pane-receipt" style="padding:16px;display:none">
    <div class="ai-panel">
      <div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:6px;letter-spacing:.05em;text-transform:uppercase"><i class="ti ti-sparkles"></i> AIレシート自動読み取り</div>
      <p style="font-size:13px;color:#534AB7;margin-bottom:12px">レシート・領収書を撮影すると金額・科目を自動判定して入力フォームへ反映します</p>
      <div class="drop-zone" onclick="el('file-input').click()">
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" style="display:none">

function renderFormSections(){
  const c=el('form-sections');if(!c)return;
  c.innerHTML='';
  CATS.forEach(cat=>{
    const tot=cat.keys.reduce((s,k)=>s+sumItems(formData[k]),0);
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:6px"><i class="ti ${cat.icon}"></i>${cat.label}</div>
      <div style="font-size:14px;font-weight:700;color:${cat.color}" id="cat-tot-${cat.keys[0]}">${fmt(tot)}</div>
    </div><div id="cat-in-${cat.keys[0]}"></div>`;
    c.appendChild(div);
    const inner=el('cat-in-'+cat.keys[0]);
    cat.keys.forEach(key=>{
      const sec=SECTIONS.find(s=>s.key===key);
      const blk=document.createElement('div');
      blk.className='sec-block';blk.id='blk-'+key;
      blk.innerHTML=`<div class="sec-head">
        <div class="sec-head-left" style="color:${sec.color}"><i class="ti ${sec.icon}"></i>${sec.label}</div>
        <span class="sec-sub" style="color:${sec.color}" id="sub-${key}">${fmt(sumItems(formData[key]))}</span>
      </div>
      <div id="rows-${key}"></div>
      <button class="btn-add-row" onclick="addRow('${key}')"><i class="ti ti-plus"></i> 明細を追加</button>`;
      inner.appendChild(blk);
      renderRows(key);
    });
  });
}

function renderRows(key){
  const c=el('rows-'+key);if(!c)return;
  const sec=SECTIONS.find(s=>s.key===key);
  c.innerHTML='';
  (formData[key]||[]).forEach(item=>appendRowEl(key,item,sec,c));
}

function appendRowEl(key,item,sec,c){
  if(!sec)sec=SECTIONS.find(s=>s.key===key);
  if(!c)c=el('rows-'+key);
  if(!c)return;
  const row=document.createElement('div');
  row.className='detail-row';row.id='dr-'+item.id;
  row.innerHTML=`<div class="dr-name"><input type="text" placeholder="${sec.ph}" value="${item.name||''}" inputmode="text" oninput="updateItem('${key}','${item.id}','name',this.value)"></div>
    <div class="dr-amt"><input type="number" placeholder="0" value="${item.amount||''}" min="0" inputmode="numeric" style="color:${sec.color}" oninput="updateItem('${key}','${item.id}','amount',parseFloat(this.value)||0)"><span class="dr-unit">円</span></div>
    <button class="btn-del" onclick="removeRow('${key}','${item.id}')"><i class="ti ti-x"></i></button>`;
  c.appendChild(row);
}

function addRow(key){
  const item={id:uid(),name:'',amount:''};
  formData[key].push(item);
  appendRowEl(key,item,null,null);
  el('dr-'+item.id)?.querySelector('input[type=text]')?.focus();
  recalc();
}

function removeRow(key,id){
  if((formData[key]||[]).length<=1){
    const it=formData[key].find(i=>i.id===id);
    if(it){it.name='';it.amount='';}
    el('dr-'+id)?.querySelectorAll('input').forEach(e=>e.value='');
    recalc();return;
  }
  formData[key]=formData[key].filter(i=>i.id!==id);
  el('dr-'+id)?.remove();
  recalc();
}

function updateItem(key,id,field,val){
  const it=(formData[key]||[]).find(i=>i.id===id);
  if(it)it[field]=val;
  recalc();
}

function recalc(){
  const mad=sumItems(formData.madoguchi),des=sumItems(formData.desaki);
  const inc=mad+des+sumItems(formData.otherIncome);
  const lab=sumItems(formData.labor);
  const fix=lab+sumItems(formData.rent)+sumItems(formData.utilities)+sumItems(formData.otherFixed);
  const vr=sumItems(formData.kaitori)+sumItems(formData.otherVar);
  const prf=inc-fix-vr;
  SECTIONS.forEach(s=>{const e=el('sub-'+s.key);if(e)e.textContent=fmt(sumItems(formData[s.key]));});
  CATS.forEach(cat=>{const e=el('cat-tot-'+cat.keys[0]);if(e)e.textContent=fmt(cat.keys.reduce((s,k)=>s+sumItems(formData[k]),0));});
  const sv=(id,v)=>{const e=el(id);if(e)e.textContent=fmt(v);};
  sv('ss-inc',inc);sv('ss-mad',mad);sv('ss-des',des);sv('ss-fix',fix);sv('ss-lab',lab);sv('ss-var',vr);
  const p=el('ss-prf');if(p){p.textContent=fmt(prf);p.style.color=prf>=0?'var(--green)':'var(--red)';}
}

// ── レシートAI ──
function handleFile(e){const f=e.target.files[0];if(f)processImage(f);}
async function processImage(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result.split(',')[1],mt=file.type;
    el('receipt-img').src=e.target.result;
    el('preview-wrap').style.display='block';
    el('ai-thinking').style.display='flex';
    el('ai-result').classList.remove('show');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:`このレシート・領収書・請求書の画像を読み取ってください。
以下のJSON形式のみで返答してください。マークダウンや説明文は不要です。

{"store_name":"店舗・会社名（不明なら空文字）","date":"日付YYYY-MM-DD形式（不明なら空文字）","items":[{"name":"品目名や内容","amount":半角数字の金額,"category":"窓口収入|出先収入|人件費|家賃|水道光熱費|その他固定費|買取|その他変動費|消費税","confidence":"高|中|低"}]}

・amountは半角数字のみ（¥や円は不要）
・読み取れない項目はitemsを空配列にする
・合計金額は含めず、明細ごとに分けて返す`}
        ]}]})
      });
      const data=await res.json();
      el('ai-thinking').style.display='none';
      const raw=data.content.map(c=>c.text||'').join('');
      const match=raw.match(/\{[\s\S]*\}/);
      if(!match)throw new Error('AIの返答を解析できませんでした。もう一度お試しください。');
      receiptResult=JSON.parse(match[0]);
      if(!receiptResult.items)receiptResult.items=[];
      renderReceiptResult();
    }catch(err){
      el('ai-thinking').style.display='none';
      el('ai-result-items').innerHTML=`<div style="color:var(--red);font-size:13px">読み取りエラー: ${err.message}</div>`;
      el('ai-result').classList.add('show');
    }
  };
  reader.readAsDataURL(file);
}

function renderReceiptResult(){
  if(!receiptResult)return;
  const cl={'窓口収入':'bg-blue','出先収入':'bg-blue','人件費':'bg-red','家賃':'bg-red','水道光熱費':'bg-red','その他固定費':'bg-red','買取':'bg-amber','その他変動費':'bg-amber','消費税':'bg-gray'};
  let html='';
  if(receiptResult.store_name)html+=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px"><strong>${receiptResult.store_name}</strong>${receiptResult.date?' ／ '+receiptResult.date:''}</div>`;
  html+=(receiptResult.items||[]).map(item=>`<div class="ai-result-row">
    <div style="flex:1"><div style="font-weight:700;font-size:14px;margin-bottom:4px">${item.name}</div>
    <span class="badge ${cl[item.category]||'bg-gray'}">${item.category}</span> <span style="font-size:11px;color:var(--text2);margin-left:4px">確度:${item.confidence}</span></div>
    <div style="font-weight:700;font-size:15px;white-space:nowrap">${fmt(item.amount)}</div>
  </div>`).join('');
  if(!receiptResult.items?.length)html='<div style="text-align:center;padding:14px;color:var(--text2);font-size:13px">項目を読み取れませんでした</div>';
  el('ai-result-items').innerHTML=html;
  el('ai-result').classList.add('show');
}

function applyReceipt(){
  if(!receiptResult?.items)return;
  const map={'窓口収入':'madoguchi','出先収入':'desaki','人件費':'labor','家賃':'rent','水道光熱費':'utilities','その他固定費':'otherFixed','買取':'kaitori','その他変動費':'otherVar','消費税':'tax'};
  receiptResult.items.forEach(item=>{
    const key=map[item.category];if(!key)return;
    const blank=(formData[key]||[]).find(i=>!i.name&&!i.amount);
    if(blank){blank.name=item.name;blank.amount=item.amount;}
    else formData[key].push({id:uid(),name:item.name,amount:item.amount});
  });
  renderFormSections();recalc();swSTab('input');toast('レシートの内容を反映しました！');
}

          <div class="kpi" style="background:var(--blue-bg)">
            <div class="kpi-label" style="color:var(--blue)">収入合計</div>
            <div class="kpi-val" style="color:var(--blue)">${fmt(inc)}</div>
            <div style="font-size:10px;color:var(--blue);margin-top:3px;opacity:.8">窓口 ${fmt(sumItems(r.madoguchi))} ／ 出先 ${fmt(sumItems(r.desaki))}</div>
          </div>
          <div class="kpi" style="background:${pro>=0?'var(--green-bg)':'var(--red-bg)'}">
            <div class="kpi-label" style="color:${pro>=0?'var(--green)':'var(--red)'}">営業利益</div>
            <div class="kpi-val" style="color:${pro>=0?'var(--green)':'var(--red)'}">${fmt(pro)}</div>
            <div style="font-size:10px;color:${pro>=0?'var(--green)':'var(--red)'};margin-top:3px;opacity:.8">利益率 ${mg!==null?mg.toFixed(1)+'%':'—'}</div>
          </div>
        </div>
        <div class="cost-grid">
          <div class="cost-box" style="background:var(--red-bg)">
            <div class="cost-label" style="color:var(--red)">固定費</div>
            <div class="cost-val" style="color:var(--red)">${fmt(fix)}</div>
            <div class="cost-sub" style="color:var(--red)">人件費 ${fmt(lab)}</div>
          </div>
          <div class="cost-box" style="background:var(--amber-bg)">
            <div class="cost-label" style="color:var(--amber)">変動費・買取</div>
            <div class="cost-val" style="color:var(--amber)">${fmt(vr)}</div>
            <div class="cost-sub" style="color:var(--amber)">買取 ${fmt(sumItems(r.kaitori))}</div>
          </div>
        </div>
        ${r.memo?`<div style="margin-top:10px;padding:9px 12px;background:var(--surface2);border-radius:var(--rsm);font-size:12px;color:var(--text2)"><i class="ti ti-note"></i> ${r.memo}</div>`:''}
        <button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:10px" onclick="swHTab('detail');setTimeout(()=>{const s=el('det-store');if(s){s.value='${s.id}';refreshDetail();}},50)">
          <i class="ti ti-list-details"></i> 明細を確認する
        </button>
      </div>
    </div>`;
  });

  wrap.innerHTML=html;
}

// ── 提出状況 ──
function refreshStatus(){
  const mo=el('status-month')?.value||ym();
  const stores=getStores(),recs=loadAllForMonth(mo);
  let unsub=0;
  const wrap=el('status-cards');if(!wrap)return;
  wrap.innerHTML=stores.map(s=>{
    const r=recs.find(x=>x.storeId===s.id);
    const emp=(r?.labor||[]).filter(i=>i.name).length;
    let dot,label,dc='—';
    if(!r){unsub++;dot='dot-gray';label='未入力';}
    else if(!r.sentToHQ){unsub++;dot='dot-r';label='下書き（未送信）';dc=new Date(r.updatedAt).toLocaleString('ja-JP');}
    else{dot='dot-g';label='送信済';dc=new Date(r.sentAt).toLocaleString('ja-JP');}
    return`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:16px;font-weight:700">${s.name}</div>
        ${emp>0?`<span class="badge bg-purple" style="background:var(--purple-bg);color:var(--purple)">${emp}名</span>`:''}
      </div>
      <div style="font-size:13px;margin-bottom:3px"><span class="dot ${dot}"></span>${label}</div>
      <div style="font-size:12px;color:var(--text2)">${s.manager||''} ${dc!=='—'?'· '+dc:''}</div>
    </div>`;
  }).join('');
  const b=el('unsub-badge');
  if(b)b.innerHTML=unsub>0?`<span class="notify-badge">${unsub}</span>`:'';
}

// ── 明細確認 ──
function populateDetailStoreSelect(){
  const stores=getStores(),sel=el('det-store');if(!sel)return;
  const cur=sel.value;
  sel.innerHTML=stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(cur)sel.value=cur;
}

function refreshDetail(){
  const sid=el('det-store')?.value,mo=el('det-month')?.value||ym();
  const wrap=el('detail-wrap');if(!wrap||!sid)return;
  const rec=loadRec(sid,mo);
  if(!rec){wrap.innerHTML='<div class="card" style="text-align:center;padding:20px;color:var(--text2)">この月のデータはまだ送信されていません</div>';return;}
  const store=getStores().find(s=>s.id===sid);
  const inc=incomeOf(rec),cos=costsOf(rec),pro=inc-cos;

  const renderBlock=(sec,items)=>{
    const filled=(items||[]).filter(i=>i.name||i.amount);
    if(!filled.length)return'';
    const tot=sumItems(filled);
    return`<div class="detail-sec">
      <div class="detail-sec-head" style="background:${sec.cat==='income'?'var(--blue-bg)':sec.cat==='fixed'?'var(--red-bg)':'var(--amber-bg)'}">
        <div class="detail-sec-head-label" style="color:${sec.color}"><i class="ti ${sec.icon}" style="font-size:13px"></i>${sec.label}</div>
        <div style="font-size:13px;font-weight:700;color:${sec.color}">${fmt(tot)}</div>
      </div>
      ${filled.map(i=>`<div class="detail-item">
        <div style="color:var(--text2)">${i.name||'（名称未設定）'}</div>
        <div style="font-weight:600;color:${sec.color}">${fmt(i.amount)}</div>
      </div>`).join('')}
    </div>`;
  };

  wrap.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:16px;font-weight:800">${store?.name||'—'}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${rec.month} · ${rec.sentToHQ?'送信済':'下書き'}</div>
      </div>
      <span class="badge ${rec.sentToHQ?'bg-green':'bg-gray'}">${rec.sentToHQ?'送信済':'下書き'}</span>
    </div>
    ${SECTIONS.map(s=>renderBlock(s,rec[s.key])).join('')}
    <div class="sum-row"><span style="color:var(--text2)">収入合計</span><span style="font-weight:700">${fmt(inc)}</span></div>
    <div class="sum-row"><span style="color:var(--text2)">費用合計</span><span style="color:var(--red);font-weight:700">${fmt(cos)}</span></div>
    <div class="sum-row total">
      <span style="font-weight:800;font-size:15px">営業利益</span>
      <span style="font-size:22px;font-weight:800;color:${pro>=0?'var(--green)':'var(--red)'}">${fmt(pro)}</span>
    </div>
    ${rec.memo?`<div style="margin-top:12px;padding:10px 13px;background:var(--surface2);border-radius:var(--rsm);font-size:13px;color:var(--text2)"><i class="ti ti-note"></i> ${rec.memo}</div>`:''}
  </div>`;
}

// ── 店舗設定 ──
function renderStoreListUI(){
  const stores=getStores(),wrap=el('store-list-ui');if(!wrap)return;
  wrap.innerHTML=stores.map(s=>`<div class="store-edit-row">
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px">店舗名</div>
    <input type="text" id="sname-${s.id}" value="${s.name}" style="padding:9px 12px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--surface);width:100%;font-size:15px;font-weight:700;margin-bottom:8px">
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px">担当者名</div>
    <input type="text" id="smgr-${s.id}" value="${s.manager||''}" placeholder="担当者名" style="padding:9px 12px;border:.5px solid var(--border2);border-radius:var(--rsm);background:var(--surface);width:100%;font-size:14px;margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="updateStore('${s.id}')"><i class="ti ti-check"></i> 保存</button>
      <button class="btn" style="color:var(--red)" onclick="deleteStore('${s.id}')"><i class="ti ti-trash"></i></button>
    </div>
  </div>`).join('');
}

function updateStore(id){
  const stores=getStores(),s=stores.find(x=>x.id===id);if(!s)return;
  const n=el('sname-'+id)?.value.trim(),m=el('smgr-'+id)?.value.trim();
  if(n)s.name=n;if(m!==undefined)s.manager=m;
  saveStores(stores);renderStoreListUI();toast('店舗情報を更新しました');
}

function deleteStore(id){
  if(!confirm('この店舗を削除しますか？'))return;
  saveStores(getStores().filter(s=>s.id!==id));
  renderStoreListUI();
}

function addStore(){
  const name=el('new-store-name')?.value.trim(),mgr=el('new-store-mgr')?.value.trim();
  if(!name){toast('店舗名を入力してください');return;}
  const stores=getStores();
  stores.push({id:'s'+Date.now(),name,manager:mgr||''});
  saveStores(stores);
  el('new-store-name').value='';el('new-store-mgr').value='';
  renderStoreListUI();toast('店舗を追加しました');
}

// ── Start ──
renderRoleSelect();
</script>
</body>
</html>
